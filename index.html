<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <title>우리 조 버킷리스트 아트 월</title>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Pen+Script&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Nanum Pen Script', cursive;
            background-color: #d4b895;
            background-image: url('https://www.transparenttextures.com/patterns/cork-board.png');
            background-attachment: fixed;
            text-align: center;
            padding-bottom: 100px;
        }

        header {
            margin: 60px auto 40px auto;
            background-color: rgba(255, 255, 255, 0.9);
            display: inline-block;
            padding: 20px 40px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 20px;
            z-index: 100;
        }

        h1 {
            color: #333;
            font-size: 2.8rem;
            margin-bottom: 10px;
        }

        .clearfix::after {
            content: "";
            display: block;
            clear: both;
        }

        .gallery-container {
            width: 90%;
            max-width: 1200px;
            margin: 0 auto;
        }

        /* 공통 카드 스타일 */
        .card {
            float: left;
            width: 31.33%;
            margin: 1%;
            background: linear-gradient(135deg, #fffcf0 0%, #fff3b0 100%);
            padding: 15px 15px 35px 15px;
            border-radius: 2px 2px 15px 5px;
            box-shadow: 3px 5px 15px rgba(0, 0, 0, 0.15);
            position: relative;
            /* 자식인 badge의 기준점 */
            transform: rotate(-3deg);
            transition: transform 0.3s ease, z-index 0s;
        }

        .card:hover {
            transform: scale(1.05) rotate(0deg);
            z-index: 10;
        }

        .card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 5px;
            margin-bottom: 15px;
        }

        .card h2 {
            color: #2c3e50;
            font-size: 1.8rem;
            margin-bottom: 10px;
        }

        .card p {
            color: #444;
            font-size: 1.3rem;
            text-align: left;
            line-height: 1.5;
        }

        .badge1 {
            position: absolute;
            right: 0px;
            top: 0px;
            background-color: yellow;
            background: radial-gradient(#fffb00 30px, rgb(255, 120, 120));
            border-radius: 50%;
            padding: 10px;
        }

        div.badge2 {
            color: white;
            background-color: red;
            position: absolute;
            width: 60px;
            border-radius: 15px;
            top: -10px;
            left: -10px;
            transform: rotate(-5deg);


            text-align: center;
        }

        /* 2. 비밀 메모 (visibility) 및 hover 효과 관련 CSS를 작성하세요 */
        .secret-memo1 {
            visibility: hidden;
        }

        .card:hover .secret-memo1 {
            visibility: visible;
            color: red;
        }

        .card:hover .secret-memo2 {
            visibility: visible !important;
        }

        .secret-memo3 {
            visibility: hidden;
        }

        .card:hover .secret-memo3 {
            visibility: visible;
        }

        .badge3 {
            position: absolute;
            left: 0px;
            top: 10px;
            background-color: rgb(238, 255, 5);
            border-radius: 50%;
            padding: 10px;

        }
    </style>
</head>

<body>
    <header>
        <h1>🏖️ 2026 버킷리스트 아트 월 🏖️</h1>
        <p style="font-size: 1.5rem; color: #555;">우리 조의 꿈들을 코르크 보드에 붙였습니다!</p>
    </header>
    <main class="gallery-container clearfix">
        <!-- 팀원들의 코드가 들어갈 자리입니다 -->
        <div class="card">
            <img src="./image/신찬영.jpg" alt="웃는 고양이" width="400">

            <h2>🙏 신찬영의 꿈 🙏</h2>
            <p>😏 1. 코딩 고수되서 게임만들기</p>
            <p>🎉 2. 3d 모델링 고수되서 원하는거 다 만들기</p>

            <div class="badge1">Laughing 🤣</div>
            <div class="secret-memo1">TMI: 근대 쉽게 게을러 짐 💀💀💀</div>
        </div>

        <div class="card">
            <!-- 개인별로 배지 추가하기 (absolute 실습) -->
            <div class="badge2">Hot🔥</div>

            <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=500&auto=format&fit=crop&q=60"
                alt="바다 풍경">
            <h2>✨ 최한결의 꿈</h2>
            <p>🗾 1. 일본여행가기</p>
            <p>💻 2. 앞으로 채워나갈 예정</p>

            <!-- 개인별로 비밀 메모 추가하기 (visibility 실습) -->
            <div class="secret-memo2" style="visibility: hidden;">🤫 TMI: 돈 없음</div>
        </div>

        <div class="card">
            <img src="img/se.jpeg" alt="배구">

            <h2>✨ 유승재의 꿈</h2>
            <p>🌊 1. 일본,친구들이랑 계획없이 놀러가기</p>
            <p>2. 배구 팀 만들기</p>
            <div class="badge3">ball✨</div>
            <div class="secret-memo3">배구 못함</div>


        </div>

    </main>
</body>

</html>
