<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>내 버킷리스트 카드</title>
    <style>
        /* 기본 카드 디자인 (자유롭게 수정 가능) */
        .card {
            width: 300px;
            margin: 50px auto;
            background: linear-gradient(135deg, #fffcf0 0%, #fff3b0 100%);
            padding: 15px 15px 35px 15px;
            border-radius: 2px 2px 15px 5px;
            box-shadow: 3px 5px 15px rgba(0,0,0,0.15);
            transform: rotate(-3deg);
            transition: transform 0.5s ease, z-index 0.3s;
            /* 배지의 기준점이 되기 위한 필수 속성 */
            position: relative; 
        }
        .card:hover {
            transform: scale(1.05) rotate(0deg);
            z-index: 10;
        }
        .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 5px; margin-bottom: 15px; }
        .card h2 { color: #2c3e50; font-size: 1.5rem; margin-bottom: 10px; }
        .card p { color: #444; font-size: 1.1rem; line-height: 1.5; }

        /* 1. 배지 (absolute) 관련 CSS를 작성하세요 */
        div.badge{
            color: white;
            background-color: red;
            position: absolute;
            width: 60px;
            border-radius: 15px;
            top: -10px;
            left: -10px;
            transform: rotate(-5deg);


            text-align: center;
        }

        /* 2. 비밀 메모 (visibility) 및 hover 효과 관련 CSS를 작성하세요 */
        .card:hover .secret-memo {visibility: visible !important;}

    </style>
</head>
<body>

        <div class="card">
            <!-- 개인별로 배지 추가하기 (absolute 실습) -->
            <div class="badge">Hot🔥</div>
            
            <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=500&auto=format&fit=crop&q=60" alt="바다 풍경">
            <h2>✨ 최한결의 꿈</h2>
            <p>🗾 1. 일본여행가기</p>
            <p>💻 2. 앞으로 채워나갈 예정</p>
            
            <!-- 개인별로 비밀 메모 추가하기 (visibility 실습) -->
            <div class="secret-memo" style="visibility: hidden;">🤫 TMI: 돈 없음</div>
        </div>
    </body>
</html>
